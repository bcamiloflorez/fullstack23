<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="estilos.css">

  <title>To-Do List</title>
</head>

<body>
  <div class="container">
    <h1>TO DO</h1>
    <div class="input-section">
      <input type="text" id="todo-input" placeholder="Create a new todo..." />
      <button id="add-btn">+</button>
    </div>
    <ul id="todo-list">
      <!--<li>
        <div class="todo-item">
          <input type="checkbox" />
          <span>tarea 1</span>
        </div>
        <button>✖</button>
      </li>-->
    </ul>
    <div class="footer">
      <span id="items-left">0 items left</span>
      <div class="filters">
        <button id="filter-all" class="filter-btn active">All</button>
        <button id="filter-active" class="filter-btn">Active</button>
        <button id="filter-completed" class="filter-btn">Completed</button>
      </div>
      <button id="clear-completed">Clear Completed</button>
    </div>
  </div>
  <script src = "./script.js"></script>

</body>

</html>
